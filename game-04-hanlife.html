<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重點4：漢人農業生活作息 - 填充題</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', Arial, sans-serif;
      background: linear-gradient(135deg, #fa8231 0%, #f7b731 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .badge { background: #fa8231; color: #fff; border-radius: 30px; padding: 4px 14px; font-size: 13px; display: inline-block; margin-bottom: 10px; }
    h1 { font-size: 22px; color: #2d2d2d; margin-bottom: 6px; }
    .rule { font-size: 14px; color: #888; margin-bottom: 20px; }
    .progress-bar { background: #eee; border-radius: 10px; height: 8px; margin-bottom: 16px; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, #fa8231, #f7b731); height: 100%; border-radius: 10px; transition: width 0.4s; }
    .score-row { display: flex; justify-content: space-between; font-size: 14px; color: #666; margin-bottom: 20px; }
    .sentence {
      font-size: 18px;
      color: #2d2d2d;
      line-height: 2;
      margin-bottom: 18px;
      background: #fff8f0;
      border-left: 4px solid #fa8231;
      padding: 14px 16px;
      border-radius: 0 12px 12px 0;
    }
    .blank-input {
      border: 2px solid #fa8231;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 17px;
      width: 120px;
      outline: none;
      background: #fff;
      color: #2d2d2d;
      vertical-align: middle;
      transition: border-color 0.2s;
    }
    .blank-input:focus { border-color: #e67e22; box-shadow: 0 0 0 3px rgba(250,130,49,0.2); }
    .blank-input.correct { border-color: #2ecc71; background: #e6f9f0; }
    .blank-input.wrong { border-color: #e74c3c; background: #fde8e8; }
    .choices { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .choice-chip {
      background: #fff3e0;
      border: 2px solid #fa8231;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .choice-chip:hover { background: #fa8231; color: #fff; }
    .choice-chip.used { opacity: 0.35; pointer-events: none; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #fa8231, #f7b731);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 4px;
    }
    .feedback { margin-top: 14px; padding: 12px 16px; border-radius: 12px; font-size: 15px; display: none; line-height: 1.5; }
    .feedback.show { display: block; }
    .feedback.correct { background: #e6f9f0; color: #1a7a45; }
    .feedback.wrong { background: #fde8e8; color: #8b1a1a; }
    .next-btn { margin-top: 12px; width: 100%; padding: 14px; background: #e67e22; color: #fff; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; display: none; }
    .next-btn.show { display: block; }
    .result-box { text-align: center; padding: 20px 0; display: none; }
    .result-box h2 { font-size: 26px; margin-bottom: 10px; }
    .result-score { font-size: 48px; font-weight: 800; color: #fa8231; }
    .result-sub { color: #888; margin: 8px 0 20px; }
    .replay-btn { padding: 14px 40px; background: linear-gradient(90deg, #fa8231, #f7b731); color: #fff; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; }
    .qr-section { text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid #eee; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
<div class="card">
  <div class="badge">重點 4／6</div>
  <h1>漢人農業社會的生活作息</h1>
  <p class="rule">從下方詞語中選出正確答案，填入空格中。</p>
  <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  <div class="score-row">
    <span id="q-count">第 1 題／共 5 題</span>
    <span>得分：<strong id="score">0</strong></span>
  </div>
  <div id="game-area">
    <div class="sentence" id="q-sentence"></div>
    <div class="choices" id="choices"></div>
    <button class="submit-btn" onclick="submitAnswer()">確認答案</button>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">下一題 →</button>
  </div>
  <div class="result-box" id="result-box">
    <h2>🏆 完成！</h2>
    <div class="result-score" id="final-score"></div>
    <div class="result-sub" id="final-sub"></div>
    <button class="replay-btn" onclick="startGame()">再玩一次</button>
  </div>
  <div class="qr-section">
    <img id="qr-img" width="100" height="100" alt="QR Code"><br>掃描開啟此遊戲
  </div>
</div>
<script>
const questions = [
  {
    before: "早期農業社會中，漢人的生活「日出而作，日入而息」，白天以",
    after: "的運行作為生活規律。",
    ans: "太陽",
    choices: ["太陽", "月亮", "星星", "農民曆"],
    exp: "白天以「太陽」運行作為生活規律，晚上則藉由月亮推測時間。"
  },
  {
    before: "農閒生活多與地方",
    after: "活動或當地的傳統節慶有關。",
    ans: "廟會",
    choices: ["廟會", "市場", "學校", "政府"],
    exp: "農閒時，漢人多與地方「廟會」活動或當地傳統節慶有關，廟宇附近也常形成臨時市集。"
  },
  {
    before: "中華文化的曆法結合太陽與月亮，記錄季節與氣候的變化，成為農民耕種的依據，被稱為",
    after: "。",
    ans: "農民曆",
    choices: ["農民曆", "陽曆", "星曆", "國曆"],
    exp: "中華文化曆法結合陽曆與陰曆，被稱為「農民曆」，是農民耕種的依據。"
  },
  {
    before: "農民曆中有",
    after: "節氣，代表一年中各時期氣候的變化。",
    ans: "二十四",
    choices: ["二十四", "十二", "三十六", "七十二"],
    exp: "農民曆中有「二十四」節氣，例如清明、穀雨等，代表一年各時期氣候的變化。"
  },
  {
    before: "打更制度是古代的報時方式，打更的人每",
    after: "小時報時一次。",
    ans: "2",
    choices: ["2", "1", "4", "6"],
    exp: "打更制度每「2」小時（即一個時辰）報時一次，同時也提醒居民防火防盜。"
  }
];

let idx = 0, score = 0, selectedChoice = null, answered = false;

function startGame() {
  idx = 0; score = 0; selectedChoice = null; answered = false;
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('game-area').style.display = 'block';
  renderQ();
}

function renderQ() {
  answered = false; selectedChoice = null;
  const q = questions[idx];
  document.getElementById('pbar').style.width = (idx / questions.length * 100) + '%';
  document.getElementById('q-count').textContent = `第 ${idx+1} 題／共 ${questions.length} 題`;

  const sentence = document.getElementById('q-sentence');
  sentence.innerHTML = q.before + ' <input type="text" class="blank-input" id="blank" placeholder="填入答案" readonly> ' + q.after;

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  q.choices.forEach(c => {
    const chip = document.createElement('button');
    chip.className = 'choice-chip';
    chip.textContent = c;
    chip.onclick = () => selectChoice(c, chip);
    choicesDiv.appendChild(chip);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').className = 'next-btn';
  document.getElementById('blank').className = 'blank-input';
}

function selectChoice(val, chip) {
  if (answered) return;
  document.querySelectorAll('.choice-chip').forEach(c => c.style.background = '');
  document.querySelectorAll('.choice-chip').forEach(c => c.style.color = '');
  chip.style.background = '#fa8231';
  chip.style.color = '#fff';
  selectedChoice = val;
  document.getElementById('blank').value = val;
}

function submitAnswer() {
  if (answered) return;
  const q = questions[idx];
  const input = document.getElementById('blank');
  const val = input.value.trim();
  if (!val) return;
  answered = true;
  document.querySelectorAll('.choice-chip').forEach(c => c.style.pointerEvents = 'none');
  const fb = document.getElementById('feedback');
  if (val === q.ans) {
    score++;
    document.getElementById('score').textContent = score;
    input.classList.add('correct');
    fb.textContent = '✅ 正確！' + q.exp;
    fb.className = 'feedback correct show';
  } else {
    input.classList.add('wrong');
    input.value = val + '（正確：' + q.ans + '）';
    fb.textContent = '❌ 答錯了！' + q.exp;
    fb.className = 'feedback wrong show';
  }
  document.getElementById('next-btn').className = 'next-btn show';
}

function nextQ() {
  idx++;
  if (idx >= questions.length) {
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('pbar').style.width = '100%';
    document.getElementById('final-score').textContent = score + ' / ' + questions.length;
    const msgs = ['繼續加油！', '還不錯！', '很好！', '表現優秀！', '完美滿分！'];
    document.getElementById('final-sub').textContent = msgs[score] || msgs[msgs.length-1];
  } else {
    renderQ();
  }
}

startGame();
document.getElementById('qr-img').src =
  'https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=' +
  encodeURIComponent(window.location.href);
</script>
</body>
</html>
